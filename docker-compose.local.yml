services:
  doryd:
    environment:
      DORY_EMBEDDING_PROVIDER: local
      DORY_EMBEDDING_DIMENSIONS: ${DORY_EMBEDDING_DIMENSIONS:-1024}
      DORY_EMBEDDING_BATCH_SIZE: ${DORY_EMBEDDING_BATCH_SIZE:-16}
      DORY_LOCAL_EMBEDDING_BASE_URL: ${DORY_LOCAL_EMBEDDING_BASE_URL:-http://host.docker.internal:8000/v1}
      DORY_LOCAL_EMBEDDING_MODEL: ${DORY_LOCAL_EMBEDDING_MODEL:-qwen3-embed}
      DORY_LOCAL_EMBEDDING_QUERY_INSTRUCTION: ${DORY_LOCAL_EMBEDDING_QUERY_INSTRUCTION:-Given a web search query, retrieve relevant passages that answer the query}
      DORY_LOCAL_EMBEDDING_TIMEOUT_SECONDS: ${DORY_LOCAL_EMBEDDING_TIMEOUT_SECONDS:-30}
      DORY_QUERY_RERANKER_ENABLED: ${DORY_QUERY_RERANKER_ENABLED:-true}
      DORY_QUERY_RERANKER_PROVIDER: local
      DORY_QUERY_RERANKER_CANDIDATE_LIMIT: ${DORY_QUERY_RERANKER_CANDIDATE_LIMIT:-40}
      DORY_LOCAL_RERANKER_BASE_URL: ${DORY_LOCAL_RERANKER_BASE_URL:-http://host.docker.internal:8000/v1}
      DORY_LOCAL_RERANKER_MODEL: ${DORY_LOCAL_RERANKER_MODEL:-qwen3-rerank}
      DORY_LOCAL_RERANKER_TIMEOUT_SECONDS: ${DORY_LOCAL_RERANKER_TIMEOUT_SECONDS:-30}
      DORY_ACTIVE_MEMORY_LLM_PROVIDER: ${DORY_ACTIVE_MEMORY_LLM_PROVIDER:-local}
      DORY_ACTIVE_MEMORY_LLM_STAGES: ${DORY_ACTIVE_MEMORY_LLM_STAGES:-compose}
      DORY_LOCAL_LLM_BASE_URL: ${DORY_LOCAL_LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      DORY_LOCAL_LLM_MODEL: ${DORY_LOCAL_LLM_MODEL:-qwen3.5:4b}
      DORY_LOCAL_LLM_TIMEOUT_SECONDS: ${DORY_LOCAL_LLM_TIMEOUT_SECONDS:-5}
      DORY_LOCAL_LLM_MAX_TOKENS: ${DORY_LOCAL_LLM_MAX_TOKENS:-512}

  dory-watch:
    environment:
      DORY_EMBEDDING_PROVIDER: local
      DORY_EMBEDDING_DIMENSIONS: ${DORY_EMBEDDING_DIMENSIONS:-1024}
      DORY_EMBEDDING_BATCH_SIZE: ${DORY_EMBEDDING_BATCH_SIZE:-16}
      DORY_LOCAL_EMBEDDING_BASE_URL: ${DORY_LOCAL_EMBEDDING_BASE_URL:-http://host.docker.internal:8000/v1}
      DORY_LOCAL_EMBEDDING_MODEL: ${DORY_LOCAL_EMBEDDING_MODEL:-qwen3-embed}
      DORY_LOCAL_EMBEDDING_QUERY_INSTRUCTION: ${DORY_LOCAL_EMBEDDING_QUERY_INSTRUCTION:-Given a web search query, retrieve relevant passages that answer the query}
      DORY_LOCAL_EMBEDDING_TIMEOUT_SECONDS: ${DORY_LOCAL_EMBEDDING_TIMEOUT_SECONDS:-30}
